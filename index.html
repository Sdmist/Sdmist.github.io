<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sdmist - Codeforces Solutions</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    
    <div class="container">
        <header>
            <div class="header-content">
                <div class="header-text">
                    <h1>Sdmist</h1>
                    <p class="subtitle">Codeforces Solutions</p>
                    <p class="description">A curated collection of problem solving approaches</p>
                </div>
                <img src="images/header-doodle.png" alt="" class="header-doodle" onerror="this.style.display='none'">
            </div>
        </header>

        <div class="controls">
            <div class="search-box">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="2"/>
                    <path d="M12.5 12.5L17 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search by problem or code name"
                    autocomplete="off"
                >
            </div>
            
            <div class="filter-box">
                <div class="filter-label">Rating Range</div>
                <div class="rating-inputs">
                    <input 
                        type="number" 
                        id="minRating" 
                        placeholder="Min" 
                        min="0" 
                        step="100"
                    >
                    <span>-</span>
                    <input 
                        type="number" 
                        id="maxRating" 
                        placeholder="Max" 
                        min="0" 
                        step="100"
                    >
                </div>
                <div class="filter-buttons">
                    <button id="filterBtn">Filter</button>
                    <button id="resetBtn">Reset</button>
                </div>
            </div>
        </div>

        <div class="table-wrapper">
            <div class="table-container">
                <table id="problemsTable">
                    <thead>
                        <tr>
                            <th class="col-code">#</th>
                            <th class="col-name">Problem</th>
                            <th class="col-rating">Rating</th>
                            <th class="col-action">Code & Explanation</th>
                        </tr>
                    </thead>
                    <tbody id="problemsBody">
                        <!-- Problems will be loaded here -->
                    </tbody>
                </table>

                <div id="noResults" class="no-results" style="display: none;">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M8 15s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01" stroke-linecap="round"/>
                    </svg>
                    <p>No problems found matching your criteria</p>
                </div>
            </div>
        </div>

        <div id="pagination" class="pagination" style="display: none;">
            <button id="prevPage" class="page-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
                <span class="btn-text">Previous</span>
            </button>
            
            <div class="page-numbers" id="pageNumbers"></div>
            
            <div class="page-jump">
                <span>Go to page:</span>
                <input type="number" id="pageJump" min="1" placeholder="1">
                <button id="jumpBtn">Go</button>
            </div>
            
            <button id="nextPage" class="page-btn">
                <span class="btn-text">Next</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </button>
        </div>

        <div class="footer-image-container">
            <img src="images/footer-home.png" alt="" class="footer-image" onerror="this.style.display='none'">
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-text">
            The solution codes available are completely free to use and to modify.<br>
            Read further <a href="documentation.html">Documentation</a>
        </div>
        <div class="footer-author">
            <a href="https://siddashalways.blogspot.com" target="_blank" rel="noopener">siddashalways</a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
