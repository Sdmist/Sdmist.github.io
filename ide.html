<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Editor - Sdmist</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="ide-page">
    <canvas id="particleCanvas"></canvas>
    
    <div class="ide-container">
        <header class="ide-header">
            <div class="ide-nav">
                <a href="index.html" class="back-btn">← Back to Problems</a>
                <h1 class="ide-title">Code Editor</h1>
            </div>
            
            <div class="ide-controls">
                <div class="control-group">
                    <label for="languageSelect">Language</label>
                    <select id="languageSelect" class="ide-select">
                        <option value="python">Python</option>
                        <option value="cpp">C++</option>
                        <option value="c">C</option>
                        <option value="java">Java</option>
                        <option value="rust">Rust</option>
                        <option value="iylira">Iylira</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label for="themeSelect">Theme</label>
                    <select id="themeSelect" class="ide-select">
                        <option value="vs-dark">Dark</option>
                        <option value="vs-light">Light</option>
                        <option value="hc-black">High Contrast</option>
                    </select>
                </div>
                
                <button id="runBtn" class="run-btn">
                    <span class="run-icon">▶</span>
                    Run Code
                </button>
            </div>
        </header>

        <div class="ide-workspace">
            <div class="editor-section">
                <div class="section-header">
                    <span class="section-label">📝 Code</span>
                    <div class="editor-info">
                        <span id="langInfo">Python</span>
                        <span id="apiLimit" class="api-limit-warning" style="display: none;">⚠️ 50 runs/day limit</span>
                    </div>
                </div>
                <div id="editor" class="monaco-editor-container"></div>
            </div>

            <div class="input-section">
                <div class="section-header">
                    <span class="section-label">📥 Input (stdin)</span>
                    <span class="section-hint">Optional - for programs that need user input</span>
                </div>
                <textarea id="input" class="input-box" placeholder="Enter input here (one value per line)..."></textarea>
            </div>

            <div class="output-section">
                <div class="section-header">
                    <span class="section-label">📤 Output</span>
                    <button id="clearOutput" class="clear-btn">Clear</button>
                </div>
                <div id="output" class="output-box">
                    <div class="output-placeholder">
                        <span class="output-icon">⚡</span>
                        <p>Run your code to see output here</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-text">
            The solution codes available are completely free to use and to modify.<br>
            Read further <a href="documentation.html">Documentation</a>
        </div>
        <div class="footer-author">
            <a href="https://siddashalways.blogspot.com" target="_blank" rel="noopener">siddashalways</a>
        </div>
    </footer>

    <!-- Monaco Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    
    <!-- Pyodide (Python in browser) -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    
    <!-- Particles -->
    <script src="script.js"></script>
    
    <!-- IDE Logic -->
    <script src="ide.js"></script>
</body>
</html>
