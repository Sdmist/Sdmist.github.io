<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problem - Sdmist</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                processEnvironments: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body class="problem-page">
    <canvas id="particleCanvas"></canvas>
    
    <div class="container problem-container">
        <nav class="problem-nav">
            <button id="backBtn" class="nav-btn">← Back to Problems</button>
            <div class="nav-controls">
                <button id="prevBtn" class="nav-btn">← Previous</button>
                <button id="nextBtn" class="nav-btn">Next →</button>
            </div>
        </nav>

        <div class="problem-detail">
            <div class="problem-header-detail">
                <span class="problem-code-detail" id="detailCode">Loading...</span>
                <h1 class="problem-title-detail" id="detailTitle">Loading...</h1>
                <span class="problem-rating-detail" id="detailRating">---</span>
            </div>

            <div class="hint-section">
                <div class="section-label">💡 Hint</div>
                <p id="detailHint">Loading...</p>
            </div>

            <div class="code-section">
                <div class="section-header">
                    <div class="language-selector">
                        <span class="section-label">📝 Solution Code</span>
                        <select id="languageSelect">
                            <option value="">Loading...</option>
                        </select>
                    </div>
                    <button id="copyBtn" class="copy-btn">Copy Code</button>
                </div>
                <div class="code-wrapper">
                    <pre><code id="detailSolution">Loading...</code></pre>
                </div>
            </div>

            <div class="complexity-section">
                <div class="section-label">⚡ Complexity Analysis</div>
                <div class="complexity-grid">
                    <div class="complexity-item">
                        <div class="complexity-label">Time Complexity</div>
                        <div class="complexity-value" id="timeComplexity">Loading...</div>
                    </div>
                    <div class="complexity-item">
                        <div class="complexity-label">Space Complexity</div>
                        <div class="complexity-value" id="spaceComplexity">Loading...</div>
                    </div>
                </div>
            </div>

            <div class="explanation-section">
                <div class="section-label">💬 Explanation</div>
                <div id="detailExplanation">Loading...</div>
            </div>
        </div>

        <div class="problem-footer-image-container">
            <img src="images/footer-problem.png" alt="" class="problem-footer-image" onerror="this.style.display='none'">
            <div class="problem-footer-image-caption">Iyra</div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-text">
            The solution codes available are completely free to use and to modify.<br>
            Read further <a href="documentation.html">Documentation</a>
        </div>
        <div class="footer-author">
            <a href="https://siddashalways.blogspot.com" target="_blank" rel="noopener">siddashalways</a>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/fortran.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/kotlin.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/rust.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/go.min.js"></script>
    <script src="problem.js"></script>
</body>
</html>
